[project]
site_name = "RDK Broadband Apps Toolkit"

repo_name = "rdkcentral/meta-rdk-broadband-apps"
repo_url = "https://github.com/rdkcentral/meta-rdk-broadband-apps"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Device Prerequisites" = "device-prerequisites.md" },
    { "Installing the Toolkit" = "installing-toolkit.md" },
    { "Building Apps" = "building-apps.md" },
    { "Deploying Apps" = "deploying-apps.md" },
  ]},
  { "System Architecture" = "architecture.md" },
  { "Acceptance Testing" = "acceptance-testing.md" },
  { "Data Models" = "data-models.md" },
]

extra_css = ["stylesheets/extra.css"]

[project.plugins.macros]
module_name = "docs/custom_macros"

[project.theme]
language = "en"
features = [
  "navigation.footer",
  "navigation.sections",
  "toc.follow",
  "navigation.top",
  "content.code.copy",
  "content.code.annotate",
  "search.suggest",
  "search.highlight",
  "content.tabs.link",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.font]
text = "Inter"
code = "Fira Code"

[[project.theme.palette]]
scheme = "default"
primary = "cyan"
accent = "cyan"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"
